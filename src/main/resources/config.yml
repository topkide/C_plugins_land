# ===================================
# Land (부동산) Plugin Configuration
# Minecraft: 1.21.4 (Paper) / Java 21
# 단일 서버 · YAML 저장 · 기존 Skript 화폐/상점 연동
# ===================================

# ----- 토지 지정(격자) -----
grid:
  # 켜면 토지가 격자 단위에 맞춰 배치됩니다.
  # 같은 크기 토지들이 타일처럼 딱 맞물려 붙기 때문에 자동 합치기가 깔끔해집니다.
  # 예시 구매서 크기(10,20,30,50)가 전부 10의 배수라 기본값 10을 권장합니다.
  enabled: true
  size: 10
  # 토지를 지정할 수 있는 월드. 비워두면 모든 월드 허용.
  allowed-worlds: [ ]

# ----- 미리보기(가짜 블록) -----
preview:
  # 선택 모드에서 범위를 표시할 블록.
  material: LIME_STAINED_GLASS
  # 이미 다른 사람이 소유한 칸과 겹칠 때 표시할 블록.
  blocked-material: RED_STAINED_GLASS
  # 미리보기 테두리를 지면에서 몇 칸 위에 그릴지.
  y-offset: 1
  # 바라보는 지점 탐지 거리(칸).
  target-distance: 40
  # 미리보기 갱신 주기(틱).
  update-interval-ticks: 4
  # 두 번째 우클릭(구매 확정)까지 최소 간격(밀리초). 한 번 누른 걸로 즉시 확정되는 것을 방지.
  confirm-delay-ms: 400

# ----- 토지 보호 -----
protection:
  # 새로 구매한 토지의 기본 보호 상태.
  default-enabled: true
  # 소유자 외 블록 파괴/설치 차단.
  block-break: true
  block-place: true
  # 상자/화로 등 컨테이너 접근 차단.
  container: true
  # 문/버튼/레버/발판 등 상호작용 차단.
  interact: true
  # 폭발(크리퍼/TNT)로 인한 지형 파괴 차단.
  explosion: true
  # 몹 그리핑(엔더맨/좀비 문부수기 등) 차단.
  mob-griefing: true
  # 용암/물 흐름이 토지 안으로 번지는 것 차단.
  fluid-flow: true
  # 피스톤이 토지 경계를 밀고 들어오는 것 차단.
  piston: true

# ----- 토지 진입 안내 -----
entry:
  enabled: true
  # TITLE 또는 ACTIONBAR
  type: TITLE
  # 자기 소유 토지에 들어갈 때도 안내할지.
  notify-own-land: true

# ----- 토지 판매/환불 -----
sell:
  # 환불 비율(%) — 구매가 대비. 예: 80 이면 구매가의 80% 환불.
  refund-percent: 80
  # 환불 지급 방식.
  #   BRIDGE  : Skript 브릿지 명령을 호출해 즉시 지갑에 입금 (권장, land_bridge.sk 필요)
  #   VOUCHER : currency.sk 의 수표(종이) 아이템을 발급 (플레이어가 우클릭해 입금)
  #   NONE    : 환불 지급 없음 (운영자가 수동 처리)
  refund-mode: BRIDGE

# ----- 경제(기존 Skript 화폐) 연동 -----
economy:
  # BRIDGE 모드에서 호출할 콘솔 명령. land_bridge.sk 가 이 명령을 처리합니다.
  # 사용 가능한 치환자: %player% %currency% %amount%
  give-command: "land-eco-give %player% %currency% %amount%"

# ----- 제한 -----
limits:
  # 1인 최대 소유 토지(구획) 수. 0 = 무제한.
  max-plots-per-player: 0

# ----- 기타 -----
misc:
  # 데이터 자동 저장 주기(분). 0 = 자동 저장 끔(종료 시에만 저장).
  autosave-minutes: 5
